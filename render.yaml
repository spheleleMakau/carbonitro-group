services:
  - type: web
    name: carbonitro
    env: python
    branch: main
    plan: free

    buildCommand: >
      python -m pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput

    startCommand: gunicorn carbonitro_project.wsgi:application --bind 0.0.0.0:$PORT --log-file -

    envVars:
      - key: DEBUG
        value: "False"

      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,carbonitro.onrender.com"

      - key: CSRF_TRUSTED_ORIGINS
        value: "https://carbonitro.onrender.com"

      - key: PYTHON_VERSION
        value: "3.11"

      - key: SECRET_KEY
        generateValue: true

      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"

      - key: EMAIL_HOST
        value: "smtp.gmail.com"

      - key: EMAIL_PORT
        value: "587"

      - key: EMAIL_USE_TLS
        value: "True"

      - key: EMAIL_USE_SSL
        value: "False"

      - key: EMAIL_HOST_USER
        value: "missmakau9@gmail.com"

      - key: EMAIL_HOST_PASSWORD
        value: "your-gmail-app-password"

      - key: DEFAULT_FROM_EMAIL
        value: "missmakau9@gmail.com"