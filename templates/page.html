{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carbonitro | {{ page }}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}" />
  </head>
  <body>
    <header class="site-header">
      <div class="logo">LOGO</div>
      <nav class="site-nav">
        <a href="/" class="{% if page == 'Home' %}active{% endif %}">Home</a>
        <a href="/about/" class="{% if page == 'About' %}active{% endif %}">About</a>
        <a href="/services/" class="{% if page == 'Services' %}active{% endif %}">Services</a>
        <a href="/contact/" class="{% if page == 'Contact' %}active{% endif %}">Contact</a>
      </nav>
    </header>

    <main class="page-content">
      <h1>Carbonitro</h1>
      <p class="status">Under Construction</p>
      <p>{{ page }} page is coming soon. Check back later!</p>
    </main>

    <footer class="site-footer">
      <p>© 2026 Carbonitro. All rights reserved.</p>
    </footer>
  </body>
</html>
